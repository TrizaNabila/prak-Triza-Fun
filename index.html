<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ServisCraft | Minecraft Style Service Hub</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* ========== MINECRAFT CUSTOM STYLES ========== */
    * {
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: pixelated;
    }

    @font-face {
      font-family: 'MinecraftTen';
      src: url('https://fonts.cdnfonts.com/s/15483/MinecraftTen.woff') format('woff');
      font-display: swap;
    }

    :root {
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'MinecraftTen', 'Courier New', monospace;
      background-color: #3b6b3b;
      background-image: repeating-linear-gradient(0deg, #4c8b4c 0px, #4c8b4c 32px, #3a6a3a 32px, #3a6a3a 64px);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    /* Minecraft Scrollbar */
    ::-webkit-scrollbar { width: 14px; }
    ::-webkit-scrollbar-track { background: #5a5a5a; border: 2px solid #2c2c2c; }
    ::-webkit-scrollbar-thumb { background: #b3b3b3; border: 2px solid #2c2c2c; box-shadow: inset 0px 0px 0px 1px #f0f0f0; }
    ::-webkit-scrollbar-thumb:hover { background: #cacaca; }

    /* Minecraft UI Components */
    .mc-panel {
      background-color: #c6c6c6;
      border: 4px solid;
      border-color: #fcfcfc #5a5a5a #5a5a5a #fcfcfc;
      box-shadow: inset 0 0 0 2px #9e9e9e;
      image-rendering: pixelated;
    }

    .mc-gui-card {
      background-color: #c0c0c0;
      border: 4px solid;
      border-color: #e0e0e0 #6b6b6b #6b6b6b #e0e0e0;
      padding: 12px;
      transition: all 0.05s linear;
      image-rendering: pixelated;
    }
    
    .mc-gui-card:hover {
      transform: translate(-2px, -2px);
      border-color: #f0f0f0 #555555 #555555 #f0f0f0;
    }

    .mc-button {
      background-color: #8b8b8b;
      border: 4px solid;
      border-color: #ffffff #4a4a4a #4a4a4a #ffffff;
      font-family: 'MinecraftTen', monospace;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 2px 2px 0px #2c2c2c;
      color: white;
      padding: 6px 20px;
      cursor: pointer;
      transition: all 0.03s linear;
      image-rendering: pixelated;
    }
    
    .mc-button:active {
      transform: translateY(2px);
      border-color: #4a4a4a #ffffff #ffffff #4a4a4a;
    }
    
    .mc-button-active {
      background-color: #5f8b3e !important;
      border-color: #b7e07c #2d4a1a #2d4a1a #b7e07c !important;
      text-shadow: 1px 1px 0px #1e3a0a;
    }
    
    .admin-active {
      background-color: #b97f3a !important;
      border-color: #ffcf7a #794f1a #794f1a #ffcf7a !important;
    }

    .mc-input {
      background-color: #2c2c2c;
      border: 4px solid #4a4a4a;
      color: #e0e0e0;
      font-family: 'MinecraftTen', monospace;
      font-size: 10px;
      padding: 10px;
      outline: none;
      width: 100%;
    }
    
    .mc-input:focus {
      border-color: #8b8b8b #f0f0f0 #f0f0f0 #8b8b8b;
    }

    .mc-select {
      background-color: #3b3b3b;
      border: 4px solid #5e5e5e;
      color: #f0f0f0;
      font-family: 'MinecraftTen', monospace;
      font-size: 10px;
      padding: 8px;
      cursor: pointer;
      width: 100%;
    }

    .mc-price {
      color: #2f6b2f;
      text-shadow: 1px 1px 0px #b6e0b6;
      font-weight: bold;
      font-size: 14px;
    }

    .mc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    @media (max-width: 640px) {
      .mc-grid { grid-template-columns: 1fr; }
    }

    /* Table Styles */
    .mc-table-container {
      overflow-x: auto;
    }
    
    .mc-table {
      border-collapse: collapse;
      width: 100%;
    }
    
    .mc-table th,
    .mc-table td {
      border: 3px solid #1f1f1f;
      padding: 12px 8px;
      vertical-align: middle;
    }
    
    .mc-table th {
      background-color: #4a4a4a;
      color: white;
      text-shadow: 1px 1px 0 black;
      font-size: 11px;
    }
    
    .mc-table td {
      background-color: #ececec;
      color: #1a1a1a;
      font-size: 11px;
    }
    
    .admin-edit-btn {
      background: #5f5f5f;
      border: 3px outset #bdbdbd;
      padding: 6px 12px;
      font-size: 9px;
      font-weight: bold;
      font-family: 'MinecraftTen', monospace;
      cursor: pointer;
      transition: 0.05s linear;
    }
    
    .admin-edit-btn:active {
      transform: translateY(2px);
      border-style: inset;
    }
    
    .badge-available {
      background-color: #3c8c40;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 10px;
      color: white;
      display: inline-block;
    }
    
    .badge-unavailable {
      background-color: #9e5a3a;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 10px;
      color: white;
      display: inline-block;
    }
  </style>
</head>
<body>

<div id="root"></div>

<!-- React & ReactDOM -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

<script type="text/babel">
// ======================= DATA SERVICES =======================
const servicesData = [
  {
    id: 1,
    name: "⚡ Ultra Nether Hub",
    category: "IT & Networking",
    price: 185000,
    rating: 4.9,
    location: { city: "Jakarta" },
    details: { availability: "Available" },
    image: "https://picsum.photos/id/104/300/200"
  },
  {
    id: 2,
    name: "🧱 Redstone Contracting",
    category: "Construction",
    price: 350000,
    rating: 4.8,
    location: { city: "Bandung" },
    details: { availability: "Available" },
    image: "https://picsum.photos/id/15/300/200"
  },
  {
    id: 3,
    name: "🍜 Village Bistro & Catering",
    category: "Food & Beverage",
    price: 89000,
    rating: 4.7,
    location: { city: "Surabaya" },
    details: { availability: "Unavailable" },
    image: "https://picsum.photos/id/30/300/200"
  },
  {
    id: 4,
    name: "🏯 End Castle Design",
    category: "Architecture",
    price: 750000,
    rating: 5.0,
    location: { city: "Jakarta" },
    details: { availability: "Available" },
    image: "https://picsum.photos/id/22/300/200"
  },
  {
    id: 5,
    name: "🧪 Enchantment Labs",
    category: "Education & Tech",
    price: 125000,
    rating: 4.6,
    location: { city: "Bandung" },
    details: { availability: "Available" },
    image: "https://picsum.photos/id/26/300/200"
  },
  {
    id: 6,
    name: "🚑 Ender Pearl Paramedic",
    category: "Healthcare",
    price: 210000,
    rating: 4.9,
    location: { city: "Surabaya" },
    details: { availability: "Unavailable" },
    image: "https://picsum.photos/id/116/300/200"
  },
  {
    id: 7,
    name: "📦 Nether Cargo Logistics",
    category: "Transport",
    price: 440000,
    rating: 4.5,
    location: { city: "Jakarta" },
    details: { availability: "Available" },
    image: "https://picsum.photos/id/58/300/200"
  },
  {
    id: 8,
    name: "🎮 Pixelmon Gaming Studio",
    category: "Entertainment",
    price: 299000,
    rating: 4.9,
    location: { city: "Bandung" },
    details: { availability: "Available" },
    image: "https://picsum.photos/id/0/300/200"
  }
];

// ========== GUEST VIEW COMPONENT ==========
function GuestView({ search, filterCategory, filterCity }) {
  const filtered = servicesData.filter(item => 
    item.name.toLowerCase().includes(search.toLowerCase()) &&
    (filterCategory === "" || item.category === filterCategory) &&
    (filterCity === "" || item.location.city === filterCity)
  );

  return (
    <div className="mc-grid">
      {filtered.map(item => (
        <div key={item.id} className="mc-gui-card flex flex-col gap-3">
          <div className="border-4 border-black bg-black h-48 overflow-hidden">
            <img 
              src={item.image} 
              className="w-full h-full object-cover" 
              style={{ imageRendering: 'pixelated' }}
              alt={item.name}
            />
          </div>
          <div className="flex flex-col gap-2">
            <span className="bg-black text-white px-2 py-1 text-[9px] inline-block w-fit border border-gray-500 uppercase tracking-wide">
              {item.category}
            </span>
            <h3 className="text-[14px] font-bold leading-tight text-gray-900">{item.name}</h3>
            <p className="text-[10px] text-gray-700 flex items-center gap-1">📍 LOC: {item.location.city}</p>
          </div>
          <div className="mt-auto pt-3 border-t-4 border-gray-500 flex justify-between items-center">
            <span className="mc-price">💰 Rp {item.price.toLocaleString()}</span>
            <span className="text-[11px] bg-yellow-800 px-2 py-1 text-yellow-200 font-bold">★ {item.rating}</span>
          </div>
        </div>
      ))}
      {filtered.length === 0 && (
        <div className="mc-panel col-span-full text-center py-12 text-gray-800">
          <span className="text-2xl">⛏️</span>
          <p className="mt-2">No services found.. try another keyword!</p>
        </div>
      )}
    </div>
  );
}

// ========== ADMIN VIEW COMPONENT ==========
function AdminView({ search, filterCategory, filterCity }) {
  const filteredData = servicesData.filter(item => 
    item.name.toLowerCase().includes(search.toLowerCase()) &&
    (filterCategory === "" || item.category === filterCategory) &&
    (filterCity === "" || item.location.city === filterCity)
  );

  const handleEdit = (serviceName) => {
    alert(`🔧 [OP PANEL] Edit service: "${serviceName}"\nIn real mod, you'd update the database.\nMinecraft style admin action!`);
  };

  return (
    <div className="mc-panel mx-auto my-6 max-w-6xl p-5 bg-[#b0b0b0]">
      <div className="mc-table-container">
        <table className="mc-table">
          <thead>
            <tr className="bg-[#3a3a3a] text-white">
              <th className="border-4 border-black p-3 text-left">🔨 ITEM</th>
              <th className="border-4 border-black p-3">📁 CAT</th>
              <th className="border-4 border-black p-3">💰 PRICE</th>
              <th className="border-4 border-black p-3">✨ STATUS</th>
              <th className="border-4 border-black p-3">⚡ ACTION</th>
             </tr>
          </thead>
          <tbody>
            {filteredData.map(service => (
              <tr key={service.id} className="hover:bg-[#d4d4aa] transition">
                <td className="border-4 border-black p-3 font-bold text-sm">{service.name}</td>
                <td className="border-4 border-black p-3 text-xs">{service.category}</td>
                <td className="border-4 border-black p-3 text-green-800 font-bold">Rp {service.price.toLocaleString()}</td>
                <td className="border-4 border-black p-3">
                  <span className={service.details.availability === 'Available' ? 'badge-available' : 'badge-unavailable'}>
                    {service.details.availability === 'Available' ? '🟢 ACTIVE' : '🔴 UNAVAILABLE'}
                  </span>
                </td>
                <td className="border-4 border-black p-3 text-center">
                  <button onClick={() => handleEdit(service.name)} className="admin-edit-btn bg-[#6b4c2c] text-white hover:bg-[#8b5e3c]">
                    ✏️ EDIT
                  </button>
                </td>
              </tr>
            ))}
            {filteredData.length === 0 && (
              <tr>
                <td colSpan="5" className="border-4 border-black p-10 text-center text-gray-800 font-bold">
                  ⚠️ No services match your filter, Commander.
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
      <div className="text-[8px] text-gray-800 text-right mt-4 border-t-2 border-gray-700 pt-2">
        🔒 Admin panel | OP access only
      </div>
    </div>
  );
}

// ========== FILTER BAR COMPONENT ==========
function FilterBar({ search, setSearch, category, setCategory, city, setCity, categories, cities }) {
  return (
    <div className="mc-panel p-5 mb-10 bg-[#a0a0a0]">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
        <div>
          <label className="block text-black text-[10px] font-bold mb-1 uppercase tracking-wider">🔍 Search Service</label>
          <input 
            type="text" 
            placeholder="e.g., Redstone, Catering..." 
            className="mc-input"
            value={search}
            onChange={(e) => setSearch(e.target.value)} 
          />
        </div>
        <div>
          <label className="block text-black text-[10px] font-bold mb-1 uppercase">📂 Category</label>
          <select className="mc-select" value={category} onChange={(e) => setCategory(e.target.value)}>
            <option value="">All Categories</option>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-black text-[10px] font-bold mb-1 uppercase">🌍 City</label>
          <select className="mc-select" value={city} onChange={(e) => setCity(e.target.value)}>
            <option value="">All Cities</option>
            {cities.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>
    </div>
  );
}

// ========== MAIN APP ==========
function App() {
  const [view, setView] = React.useState('guest');
  const [search, setSearch] = React.useState("");
  const [category, setCategory] = React.useState("");
  const [city, setCity] = React.useState("");

  const categories = [...new Set(servicesData.map(item => item.category))];
  const cities = [...new Set(servicesData.map(item => item.location.city))];

  return (
    <div className="min-h-screen">
      <div className="max-w-7xl mx-auto">
        {/* HEADER MINECRAFT TITLE */}
        <header className="flex flex-col items-center mb-8 gap-5 pt-6">
          <div className="text-center">
            <h1 className="text-5xl md:text-6xl font-mc text-white tracking-widest" style={{ textShadow: '6px 6px 0px #2c2c2c' }}>
              Servis<span className="text-[#6caf3c]">Craft</span>
            </h1>
            <p className="text-white text-[12px] mt-2 bg-black/40 inline-block px-4 py-1 border-2 border-gray-600">
              ⚡ server-rank services | pixel perfect
            </p>
          </div>
          
          {/* VIEW TOGGLER */}
          <div className="flex gap-4 mc-panel p-2 bg-[#8f8f8f]">
            <button 
              onClick={() => setView('guest')} 
              className={`mc-button ${view === 'guest' ? 'mc-button-active' : ''}`}
            >
              🧙 PLAYER VIEW
            </button>
            <button 
              onClick={() => setView('admin')} 
              className={`mc-button ${view === 'admin' ? 'admin-active' : ''}`}
            >
              👑 OP PANEL
            </button>
          </div>
        </header>

        {/* FILTER CONTROLS */}
        <FilterBar 
          search={search} setSearch={setSearch}
          category={category} setCategory={setCategory}
          city={city} setCity={setCity}
          categories={categories} cities={cities}
        />

        {/* RENDER VIEW */}
        {view === 'guest' ? 
          <GuestView search={search} filterCategory={category} filterCity={city} /> : 
          <AdminView search={search} filterCategory={category} filterCity={city} />
        }
        
        {/* FOOTER */}
        <footer className="mt-16 mc-panel p-3 text-center text-black text-[9px]">
          <p className="flex justify-center gap-4 items-center">
            <span>⛏️ ServisCraft © 2025 — All blocks preserved</span>
            <span className="w-1 h-1 bg-black rounded-full"></span>
            <span>✨ Made with redstone & react ✨</span>
          </p>
        </footer>
      </div>
    </div>
  );
}

// RENDER APP
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
